{% load static %}
<header class="header">
    <div class="header-content">
        <div class="header-logo">
            <a href="/" class="logo-text">BSUIR Open XIV</a>
        </div>
        
        <nav class="header-nav">
            <ul>
                <li><a href="#main">Главная</a></li>
                <li><a href="#about">Об олимпиаде</a></li>
                <li><a href="#stages">Этапы</a></li>
                <li><a href="#schedule">Расписание</a></li>
                <li><a href="#partners">Партнеры</a></li>
                <li><a href="#rules">Правила</a></li>
            </ul>
        </nav>

        <div class="header-controls">
            <div class="language-selector">
                <select id="language-select">
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                </select>
            </div>
            
            {% if user.is_authenticated %}
                <a href="/account/" class="auth-link">Личный кабинет</a>
                <a href="/logout/" class="auth-link logout">Выйти</a>
            {% else %}
                <a href="/login/" class="auth-link">Войти</a>
            {% endif %}
        </div>
    </div>
</header>
